<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NPC Smart Canteen — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<!-- Google Identity Services Library -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --red:#d62828;--red2:#f77f00;
  --bg:#f8f4f0;--card:#ffffff;
  --text:#1a1a2e;--dim:#6b7280;--muted:#9ca3af;
  --border:#e5e7eb;--shadow:0 20px 60px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

.blob{
  position:fixed;border-radius:50%;filter:blur(80px);opacity:0.12;
  animation:float 8s ease-in-out infinite;pointer-events:none;
}
.blob1{width:500px;height:500px;background:var(--red);top:-100px;left:-100px;animation-delay:0s;}
.blob2{width:400px;height:400px;background:var(--red2);bottom:-80px;right:-80px;animation-delay:3s;}
.blob3{width:300px;height:300px;background:#e63946;top:50%;left:50%;animation-delay:1.5s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(214,40,40,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(214,40,40,0.04) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}

.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:440px;
  animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

.login-card{
  background:var(--card);
  border-radius:28px;
  padding:44px 40px 36px;
  box-shadow:var(--shadow),0 0 0 1px rgba(0,0,0,0.04);
  border:1px solid var(--border);
}

.school-header{text-align:center;margin-bottom:32px;}
.school-seal{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--red),#c1121f);
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;
  box-shadow:0 8px 24px rgba(214,40,40,0.3);
  margin-bottom:12px;
  animation:sealPop 0.5s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}
@keyframes sealPop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.school-name{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:var(--text);
  line-height:1.2;margin-bottom:2px;
}
.school-sub{font-size:12px;color:var(--dim);letter-spacing:0.5px;}

.role-select{display:flex;gap:10px;margin-bottom:20px;}
.role-btn{
  flex:1;padding:12px;
  background:#f9fafb;border:2px solid var(--border);
  border-radius:12px;text-align:center;cursor:pointer;
  transition:all 0.2s;font-family:'DM Sans',sans-serif;
}
.role-btn:hover{border-color:#d1d5db;background:#f3f4f6;}
.role-btn.active{border-color:var(--red);background:#fff5f5;color:var(--red);}
.role-btn .role-icon{font-size:20px;display:block;margin-bottom:4px;}
.role-btn .role-label{font-size:12px;font-weight:600;}

.field-group{margin-bottom:16px;}
.field-group label{
  display:block;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin-bottom:6px;
}
.field-group input{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  font-size:14px;color:var(--text);
  font-family:'DM Sans',sans-serif;
  background:#fafafa;
  transition:all 0.2s;
}
.field-group input:focus{
  outline:none;
  border-color:var(--red);
  background:#fff;
  box-shadow:0 0 0 3px rgba(214,40,40,0.08);
}

.error-box{
  background:#fef2f2;border:1px solid #fecaca;
  border-radius:10px;padding:12px 14px;
  font-size:13px;color:#dc2626;
  margin-top:12px;display:none;
  text-align:center;
}

.domain-pill{
  display:inline-flex;align-items:center;justify-content:center;
  gap:6px; background:#f0fdf4;border:1px solid #bbf7d0;
  border-radius:20px;padding:4px 12px;
  font-size:11px;font-weight:600;color:#16a34a;
  margin:0 auto 16px; width: 100%;
}

.login-footer{
  text-align:center;margin-top:20px;
  font-size:11.5px;color:var(--muted);
  line-height:1.6;
}
.login-footer strong{color:var(--dim);}

@media(max-width:480px){
  .login-card{padding:32px 24px 28px;border-radius:20px;}
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="school-header">
      <div class="school-seal">🏫</div>
      <div class="school-name">NPC Smart Canteen</div>
      <div class="school-sub">Navotas Polytechnic College</div>
    </div>

    <div class="domain-pill">✓ &nbsp;@navotaspolytechniccollege.edu.ph only</div>

    <!-- Role Selection -->
    <div class="role-select" id="roleSelect">
      <div class="role-btn active" id="roleStudent" onclick="setRole('student')">
        <span class="role-icon">🎓</span>
        <span class="role-label">Student</span>
      </div>
      <div class="role-btn" id="roleAdmin" onclick="setRole('admin')">
        <span class="role-icon">⚙️</span>
        <span class="role-label">Admin</span>
      </div>
    </div>

    <!-- Admin Password Field -->
    <div id="adminPasswordField" style="display:none;">
      <div class="field-group">
        <label>Admin Password</label>
        <input type="password" id="loginPassword" placeholder="Enter admin123" />
      </div>
    </div>

    <!-- Official Google Auth Render Container -->
    <div id="googleBtnWrapper" style="display: flex; justify-content: center; margin-top: 10px;"></div>

    <!-- Loading / Errors -->
    <div class="error-box" id="loginError"></div>

    <div class="login-footer">
      <strong>Students:</strong> Simply sign in with Google.<br/>
      <strong>Admin:</strong> Select Admin, enter password, then click Google.
    </div>
  </div>
</div>

<script>
// ─── CONFIGURATION ───────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = "680338956993-1frpc44346hm721g7mhlgd04dp38q5lv.apps.googleusercontent.com";
let selectedRole = 'student';

// Check if user is already logged in
document.addEventListener('DOMContentLoaded', () => {
  fetch('/api/auth/me').then(r => r.json()).then(data => {
    if (data.user) redirectUser(data.user);
  });
});

// Setup the Google Button Rendering
window.onload = function () {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleResponse
  });
  
  // Renders the official, unblockable Google Button
  google.accounts.id.renderButton(
    document.getElementById("googleBtnWrapper"),
    { theme: "outline", size: "large", width: 350, shape: "rectangular", text: "continue_with" } 
  );
};

// Handle Role Switching
function setRole(role) {
  selectedRole = role;
  document.getElementById('roleStudent').classList.toggle('active', role === 'student');
  document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
  
  const passField = document.getElementById('adminPasswordField');
  if (role === 'admin') {
    passField.style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').focus();
  } else {
    passField.style.display = 'none';
  }
}

// Routes the user
function redirectUser(user) {
  if (user.role === 'admin') window.location.href = '/admin';
  else window.location.href = '/student';
}

// Handled automatically when Google completes auth
async function handleGoogleResponse(response) {
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  
  const manualPassword = document.getElementById('loginPassword') ? document.getElementById('loginPassword').value : '';

  if (selectedRole === 'admin' && !manualPassword) {
    showError('Please type the Admin Password before clicking Google.');
    return;
  }

  try {
    const res = await fetch('/api/auth/google-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        credential: response.credential, 
        selectedRole: selectedRole,
        manualPassword: manualPassword
      })
    });
    
    const data = await res.json();

    if (!res.ok) { 
      showError(data.error || 'Login failed.'); 
      return; 
    }

    redirectUser(data.user);
  } catch (e) {
    showError('Connection error. Make sure your server is running.');
  }
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; 
  el.style.display = 'block';
}
</script>
</body>
</html>
