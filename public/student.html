<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NPC Canteen — Order Food</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#d62828;--red-dark:#a11d1d;--red-glow:rgba(214,40,40,0.2);
  --gold:#f77f00;--green:#2d6a4f;--green-light:#d8f3dc;
  --bg:#f5f0eb;--surface:#ffffff;--surface2:#faf7f4;
  --border:#e8e0d8;--border2:#d1c9c0;
  --text:#1c1917;--dim:#6b7280;--muted:#9ca3af;
  --shadow:0 4px 20px rgba(0,0,0,0.06);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── NAV ── */
.nav{
  height:var(--nav-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 12px rgba(0,0,0,0.05);
}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--text);}
.nav-logo{
  width:36px;height:36px;background:var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 12px var(--red-glow);
}
.nav-right{display:flex;align-items:center;gap:10px;}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px 6px 8px;
  font-size:13px;font-weight:500;
}
.avatar{
  width:28px;height:28px;background:var(--red);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-email{font-size:11px;color:var(--dim);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-out{
  padding:8px 14px;background:none;border:1px solid var(--border2);
  border-radius:8px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.btn-out:hover{border-color:var(--red);color:var(--red);}

/* ── TABS ── */
.tabs{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;gap:4px;overflow-x:auto;
}
.tab{
  padding:14px 20px;background:none;border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:var(--dim);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all 0.2s;position:relative;
}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab:hover:not(.active){color:var(--text);}
.tab-badge{
  position:absolute;top:8px;right:4px;
  background:var(--red);color:#fff;
  border-radius:10px;font-size:10px;padding:1px 5px;font-weight:700;
  display:none;
}
.tab-badge.show{display:inline-block;}

/* ── PAGE ── */
.page{display:none;padding:24px;}
.page.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── LAYOUT ── */
.order-layout{
  display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;
  max-width:1300px;
}

/* ── MENU GRID ── */
.section-title{
  font-family:'DM Serif Display',serif;font-size:22px;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.section-title span{font-size:13px;font-weight:500;color:var(--dim);font-family:'DM Sans',sans-serif;}
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:14px;
}
.menu-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:18px;
  padding:20px 14px 16px;
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;text-align:center;
}
.menu-card:hover:not(.sold-out){
  border-color:rgba(214,40,40,0.4);
  transform:translateY(-4px);
  box-shadow:0 12px 28px rgba(214,40,40,0.12);
}
.menu-card:active:not(.sold-out){transform:scale(0.97);}
.menu-card.sold-out{opacity:0.45;cursor:not-allowed;}
.food-icon{font-size:36px;display:block;margin-bottom:10px;line-height:1;}
.food-name{font-weight:600;font-size:14px;line-height:1.3;margin-bottom:6px;}
.food-price{color:var(--red);font-weight:700;font-size:16px;}
.stock-pill{
  position:absolute;top:10px;right:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;font-size:11px;font-weight:700;
  padding:2px 7px;color:var(--dim);
}
.stock-pill.low{background:#fef3cd;border-color:#fcd34d;color:#92400e;}
.stock-pill.ok{background:#d8f3dc;border-color:#95d5b2;color:var(--green);}

/* ── CART PANEL ── */
.cart-panel{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:20px;
  position:sticky;top:calc(var(--nav-h) + 60px + 16px);
  box-shadow:var(--shadow);
}
.mobile-cart-header { display: none; }
.cart-title{font-weight:700;font-size:15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.cart-count{background:var(--red);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:2px 8px;}
.cart-empty{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.cart-empty-icon{font-size:36px;opacity:0.4;}
.cart-items{max-height:280px;overflow-y:auto;margin-bottom:12px;}
.cart-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.ci{flex-grow:1;}
.ci-name{font-size:13px;font-weight:600;}
.ci-price{font-size:11px;color:var(--dim);}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qbtn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qnum{font-weight:700;font-size:14px;min-width:20px;text-align:center;}
.cart-total{display:flex;justify-content:space-between;padding:12px 0;border-top:1.5px solid var(--border2);font-weight:700;font-size:18px;margin-bottom:12px;}
.cart-total span:last-child{color:var(--red);}
.btn-order{width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-order:disabled{opacity:0.4;cursor:not-allowed;}

/* ── HISTORY TABLE ── */
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);max-width:1000px;}
.hist-table-wrap{overflow-x:auto;margin-top:16px;}
.hist-table{width:100%;border-collapse:collapse;font-size:13px;}
.hist-table th{text-align:left;padding:10px 16px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);font-weight:600;border-bottom:2px solid var(--border);}
.hist-table td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:top;}
.ord-badge{display:inline-block;background:rgba(214,40,40,0.08);border:1px solid rgba(214,40,40,0.2);color:var(--red);border-radius:6px;padding:2px 8px;font-weight:700;font-size:12px;}
.status-served{display:inline-flex;background:var(--green-light);border:1px solid #95d5b2;color:var(--green);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.status-pending{display:inline-flex;background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.status-cancelled{display:inline-flex;background:#f3f4f6;border:1px solid #d1d5db;color:#6b7280;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid;}
.btn-cancel{background:#fff;border-color:#fca5a5;color:var(--red);}
.btn-qr{background:var(--surface2);border-color:var(--border2);color:var(--text);margin-right:6px;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-box{background:#fff;border-radius:28px;padding:40px 36px;text-align:center;max-width:380px;width:100%;transform:scale(0.85);transition:transform 0.4s;}
.modal-bg.show .modal-box{transform:scale(1);}
.modal-num{font-family:'DM Serif Display',serif;font-size:50px;color:var(--red);margin:8px 0;}
.modal-qr img{width:180px;height:180px;border-radius:4px;}
.btn-close{padding:12px 28px;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── MOBILE RESPONSIVENESS ── */
.cart-fab { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 160; width: 60px; height: 60px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(214,40,40,0.4); align-items: center; justify-content: center; }
.fab-badge { position: absolute; top: -2px; right: -2px; background: #fff; color: var(--red); border-radius: 10px; font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; display: none; align-items: center; justify-content: center; border: 2px solid var(--red); }
.fab-badge.show { display: flex; }

@media(max-width:900px){
  .order-layout{grid-template-columns:1fr;}
  
  /* Mobile Bottom Sheet Cart */
  .cart-panel {
    display: none; /* Hidden by default */
    position: fixed !important;
    bottom: 0; left: 0; right: 0; top: auto;
    z-index: 1000;
    margin: 0;
    border-radius: 24px 24px 0 0;
    max-height: 85vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
    animation: slideUpCart 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .cart-panel.show { display: block; }
  
  .mobile-cart-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .mobile-cart-close-btn {
    background: none; border: none; font-size: 24px; color: var(--dim); cursor: pointer; padding: 4px;
  }
  
  .cart-title { display: none; } /* hide default title */
  
  /* FAB appears on mobile */
  .cart-fab { display: flex; }
}
@keyframes slideUpCart { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* TOASTS */
.toasts{position:fixed;top:74px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.1);display:flex;align-items:center;gap:10px;animation:toastIn 0.3s;pointer-events:all;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.toast.s{border-left:3px solid #16a34a;}
.toast.e{border-left:3px solid var(--red);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><div class="nav-logo">🏫</div>NPC Canteen</div>
  <div class="nav-right">
    <div class="user-chip">
      <div class="avatar" id="navAvatar">?</div>
      <div>
        <div id="navName" style="font-weight:600;font-size:13px;">Loading...</div>
        <div class="user-email" id="navEmail"></div>
      </div>
    </div>
    <button class="btn-out" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="tabs">
  <button class="tab active" data-tab="order" onclick="switchTab('order')">🛒 Order Food</button>
  <button class="tab" data-tab="history" onclick="switchTab('history')">📋 My Orders <span class="tab-badge" id="pendingBadge"></span></button>
</div>

<div class="page active" id="page-order">
  <div class="order-layout">
    <div>
      <div class="section-title">Today's Menu <span id="menuSubtitle"></span></div>
      <div class="menu-grid" id="menuGrid"><div class="empty">Loading menu...</div></div>
    </div>
    
    <!-- Mobile background overlay for cart -->
    <div id="cartOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999;" onclick="toggleMobileCart()"></div>
    
    <div class="cart-panel" id="cartPanel">
      <div class="mobile-cart-header">
        <h3 style="font-size: 18px;">Your Tray</h3>
        <button class="mobile-cart-close-btn" onclick="toggleMobileCart()">✕</button>
      </div>
      <div class="cart-title">Your Tray <span class="cart-count" id="cartCount" style="display:none">0</span></div>
      <div class="cart-items" id="cartItems"><div class="cart-empty">Tap a food item to add it</div></div>
      <div class="cart-total"><span>Total</span><span>₱<span id="cartTotal">0.00</span></span></div>
      <button class="btn-order" id="btnOrder" onclick="placeOrder()" disabled>Generate QR & Order →</button>
    </div>
  </div>
</div>

<div class="page" id="page-history">
  <div class="hist-card">
    <div class="section-title">My Orders</div>
    <div id="histContent"><div class="empty">No orders yet.</div></div>
  </div>
</div>

<button class="cart-fab" id="cartFab" onclick="toggleMobileCart()">🛒<div class="fab-badge" id="fabBadge">0</div></button>

<div class="modal-bg" id="qrModal">
  <div class="modal-box">
    <p style="font-size:11px;text-transform:uppercase;color:var(--dim);">Show this QR code at the counter</p>
    <div class="modal-num" id="qrNum">#0000</div>
    <div class="modal-qr" style="background:#f8f4f0;padding:16px;border-radius:16px;display:inline-block;margin:16px 0;"><img id="qrImg" src="" alt="QR"/></div><br/>
    <button class="btn-close" onclick="closeModal()">Done</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let currentUser = null;
let menuItems = [];
let cart = {}; 
let cartOpen = false;

async function init() {
  const res = await fetch('/api/auth/me');
  const { user } = await res.json();
  if (!user) { window.location.href = '/'; return; }
  if (user.role === 'admin') { window.location.href = '/admin'; return; }
  currentUser = user;
  document.getElementById('navName').textContent = user.name;
  document.getElementById('navEmail').textContent = user.email;
  document.getElementById('navAvatar').textContent = user.name[0].toUpperCase();
  await loadMenu();
  await loadHistory();
}

async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/'; }

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + id));
  if (id === 'history') loadHistory();
}

async function loadMenu() {
  const res = await fetch('/api/menu');
  menuItems = await res.json();
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');
  document.getElementById('menuSubtitle').textContent = menuItems.length ? `${menuItems.length} items available` : '';
  if (!menuItems.length) { grid.innerHTML = '<div class="empty">No food available yet.</div>'; return; }
  grid.innerHTML = menuItems.map(item => {
    const remaining = item.stock - (cart[item.id]?.qty || 0);
    const soldOut = remaining <= 0;
    return `
      <div class="menu-card ${soldOut ? 'sold-out' : ''}" onclick="${soldOut ? '' : `addToCart(${item.id})`}">
        <div class="stock-pill ${remaining <= 3 ? 'low' : 'ok'}">${remaining}</div>
        <span class="food-icon">${item.emoji}</span>
        <div class="food-name">${item.name}</div>
        <div class="food-price">₱${parseFloat(item.price).toFixed(2)}</div>
        ${soldOut ? '<div style="position:absolute;inset:0;background:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center"><span style="background:var(--red);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700">SOLD OUT</span></div>' : ''}
      </div>
    `;
  }).join('');
}

function addToCart(id) {
  const item = menuItems.find(i => i.id === id);
  if (!item || (item.stock - (cart[id]?.qty || 0)) <= 0) return toast('e', 'No more stock!');
  cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { ...item, qty: 1 };
  renderMenu(); renderCart(); toast('s', `${item.emoji} Added!`);
}

function changeQty(id, delta) {
  const newQty = cart[id].qty + delta;
  if (newQty <= 0) delete cart[id];
  else if (newQty > menuItems.find(i => i.id == id).stock) return toast('e', 'Not enough stock!');
  else cart[id].qty = newQty;
  renderMenu(); renderCart();
}

function renderCart() {
  const totalQty = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const totalAmt = Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
  
  if (totalQty > 0) {
    document.getElementById('cartCount').style.display = 'inline-block';
    document.getElementById('cartCount').textContent = totalQty;
    document.getElementById('fabBadge').classList.add('show');
    document.getElementById('fabBadge').textContent = totalQty;
  } else {
    document.getElementById('cartCount').style.display = 'none';
    document.getElementById('fabBadge').classList.remove('show');
  }

  const el = document.getElementById('cartItems');
  if (!totalQty) {
    el.innerHTML = '<div class="cart-empty">Tap a food item to add it</div>';
    document.getElementById('btnOrder').disabled = true;
  } else {
    el.innerHTML = Object.entries(cart).map(([id, item]) => `
      <div class="cart-row">
        <div class="ci"><div class="ci-name">${item.emoji} ${item.name}</div><div class="ci-price">₱${parseFloat(item.price).toFixed(2)}</div></div>
        <div class="qty-ctrl"><button class="qbtn" onclick="changeQty(${id},-1)">−</button><span class="qnum">${item.qty}</span><button class="qbtn" onclick="changeQty(${id},1)">+</button></div>
      </div>
    `).join('');
    document.getElementById('btnOrder').disabled = false;
  }
  document.getElementById('cartTotal').textContent = totalAmt.toFixed(2);
}

function toggleMobileCart() {
  cartOpen = !cartOpen;
  document.getElementById('cartPanel').classList.toggle('show', cartOpen);
  document.getElementById('cartOverlay').style.display = cartOpen ? 'block' : 'none';
}

async function placeOrder() {
  if (!Object.keys(cart).length) return;
  const items = Object.entries(cart).map(([menuItemId, item]) => ({ menuItemId: parseInt(menuItemId), quantity: item.qty }));
  document.getElementById('btnOrder').disabled = true;

  const res = await fetch('/api/orders', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items })
  });
  if (!res.ok) { document.getElementById('btnOrder').disabled = false; return toast('e', 'Order failed'); }

  const data = await res.json();
  showQRModal(data.order.order_code);
  cart = {}; 
  if (cartOpen) toggleMobileCart();
  await loadMenu(); renderCart(); await loadHistory(); toast('s', `Order placed!`);
}

function showQRModal(code) {
  document.getElementById('qrNum').textContent = '#' + code.split('-').pop();
  document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(code)}`;
  document.getElementById('qrModal').classList.add('show');
}
function closeModal() { document.getElementById('qrModal').classList.remove('show'); }

async function loadHistory() {
  const res = await fetch('/api/orders');
  const orders = await res.json();

  const pending = orders.filter(o => o.status === 'pending').length;
  const badge = document.getElementById('pendingBadge');
  if (pending > 0) { badge.textContent = pending; badge.classList.add('show'); } else badge.classList.remove('show');

  const el = document.getElementById('histContent');
  if (!orders.length) return el.innerHTML = '<div class="empty">No orders yet.</div>';

  el.innerHTML = `<table class="hist-table">
    <thead><tr><th>Order Code</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${orders.map(o => {
      const items = (o.items||[]).map(i => `<div style="font-size:12px"><strong>${i.quantity}×</strong> ${i.menu_item_emoji} ${i.menu_item_name}</div>`).join('');
      const badge = o.status === 'served' ? '<span class="status-served">✓ Served</span>' : o.status === 'cancelled' ? '<span class="status-cancelled">✕ Cancelled</span>' : '<span class="status-pending">⏳ Pending</span>';
      
      let actions = '';
      if(o.status === 'pending') {
          actions = `
            <button class="btn-sm btn-qr" onclick="showQRModal('${o.order_code}')">QR Code</button>
            <button class="btn-sm btn-cancel" onclick="cancelOrder(${o.id})">Cancel</button>
          `;
      } else if (o.status === 'served') {
          actions = `<span style="font-size:11px;color:var(--dim)">Served on ${new Date(o.served_at).toLocaleTimeString()}</span>`;
      }

      return `<tr>
        <td><span class="ord-badge">${o.order_code}</span></td>
        <td>${items}</td>
        <td style="font-weight:700;color:var(--red)">₱${parseFloat(o.total).toFixed(2)}</td>
        <td>${badge}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

async function cancelOrder(id) {
    if(!confirm("Are you sure you want to cancel this order?")) return;
    const res = await fetch(`/api/orders/${id}/cancel`, { method: 'PUT' });
    if(res.ok) {
        toast('s', 'Order cancelled successfully.');
        loadHistory();
        loadMenu(); 
    } else {
        toast('e', 'Failed to cancel order.');
    }
}

function toast(type, msg) {
  const tc = document.getElementById('toasts');
  const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${type==='s'?'✓':'✕'}</span> ${msg}`;
  tc.appendChild(t); setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2800);
}

init();
</script>
